name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, linux, proxmox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Go binary
        run: |
          export PATH=$PATH:/usr/local/go/bin
          CGO_ENABLED=0 GOOS=linux go build -mod=mod -ldflags='-w -s' -o webhook .

      - name: Verify binary
        run: |
          file webhook
          ls -lh webhook

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -t cert-manager-webhook-easydns:${{ steps.tag.outputs.tag }} .

      - name: Clean up local image
        if: always()
        run: |
          docker rmi cert-manager-webhook-easydns:${{ steps.tag.outputs.tag }} || true
