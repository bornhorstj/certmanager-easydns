{{/*
  deployment.yaml — Runs the easyDNS webhook as a Kubernetes Deployment.

  A Deployment ensures the webhook pod is always running. If it crashes,
  Kubernetes automatically restarts it. The webhook listens for calls from
  cert-manager whenever a certificate needs to be issued or renewed.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cert-manager-webhook-easydns.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cert-manager-webhook-easydns.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cert-manager-webhook-easydns.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cert-manager-webhook-easydns.selectorLabels" . | nindent 8 }}
    spec:
      # Use a dedicated service account (defined in serviceaccount.yaml)
      # This controls what Kubernetes API permissions the webhook has.
      serviceAccountName: {{ include "cert-manager-webhook-easydns.fullname" . }}

      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          args:
            # Tell the webhook what port to listen on
            - --tls-cert-file=/tls/tls.crt
            - --tls-private-key-file=/tls/tls.key
            # Use 8443 so the non-root container can bind without NET_BIND_SERVICE
            - --secure-port=8443

          ports:
            - name: https
              containerPort: 8443
              protocol: TCP

          # Health checks — Kubernetes uses these to know if the pod is healthy.
          # If these fail, Kubernetes will restart the pod automatically.
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # Mount the TLS certificate so our webhook can serve HTTPS.
          # This cert is auto-generated by cert-manager (see certificate.yaml).
          volumeMounts:
            - name: certs
              mountPath: /tls
              readOnly: true

      volumes:
        - name: certs
          secret:
            # This secret is automatically populated by cert-manager with a TLS cert
            secretName: {{ include "cert-manager-webhook-easydns.fullname" . }}-tls
